apiVersion: v1
kind: Namespace
metadata:
  name: smartdoc
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smartdoc-config
  namespace: smartdoc
data:
  NODE_ENV: "production"
  JWT_EXPIRES_IN: "7d"
  ADMIN_FULL_NAME: "SmartDoc Admin"
  ADMIN_PHONE: "+94770000000"
  SMTP_SERVICE: "gmail"
  PAYPAL_BASE_URL: "https://api-m.sandbox.paypal.com"
  LKR_TO_USD_RATE: "0.0033"
  ATLAS_VECTOR_INDEX: "vector_index"
  JITSI_BASE_URL: "https://meet.jit.si"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: patient-uploads-pvc
  namespace: smartdoc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-uploads-pvc
  namespace: smartdoc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: smartdoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: smartdoc-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: SERVICE_NAME
              value: "Auth Service"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: smartdoc-config
                  key: NODE_ENV
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: smartdoc-secrets
                  key: MONGODB_URI_AUTH
            - name: MONGODB_DB_NAME
              value: "smartdoc_auth"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smartdoc-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: smartdoc-config
                  key: JWT_EXPIRES_IN
            - name: ADMIN_FULL_NAME
              valueFrom:
                configMapKeyRef:
                  name: smartdoc-config
                  key: ADMIN_FULL_NAME
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: smartdoc-secrets
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartdoc-secrets
                  key: ADMIN_PASSWORD
            - name: ADMIN_PHONE
              valueFrom:
                configMapKeyRef:
                  name: smartdoc-config
                  key: ADMIN_PHONE
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: smartdoc
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30001
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: smartdoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: smartdoc-patient-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: SERVICE_NAME
              value: "Patient Service"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: smartdoc-config
                  key: NODE_ENV
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: smartdoc-secrets
                  key: MONGODB_URI_PATIENT
            - name: MONGODB_DB_NAME
              value: "smartdoc_patient"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smartdoc-secrets
                  key: JWT_SECRET
          volumeMounts:
            - name: patient-uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: patient-uploads
          persistentVolumeClaim:
            claimName: patient-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: smartdoc
spec:
  selector:
    app: patient-service
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30002
  type: NodePort
---
