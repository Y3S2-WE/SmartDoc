# ──────────────────────────────────────────────────────────────────────────────
# SmartDoc — Docker Compose
# All environment variables are read from the root .env file.
# Copy .env.example → .env and fill in your real secrets before running.
# ──────────────────────────────────────────────────────────────────────────────

networks:
  smartdoc-net:
    driver: bridge

volumes:
  patient-uploads:
  ai-uploads:

services:

  # ── Frontend (React/Vite → Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-http://localhost:3001/api/auth}
        VITE_PATIENT_API_URL: ${VITE_PATIENT_API_URL:-http://localhost:3002/api/patients}
        VITE_DOCTOR_API_URL: ${VITE_DOCTOR_API_URL:-http://localhost:3003/api/doctors}
        VITE_PAYMENT_API_URL: ${VITE_PAYMENT_API_URL:-http://localhost:3005}
        VITE_APPOINTMENT_API_URL: ${VITE_APPOINTMENT_API_URL:-http://localhost:3004/api/appointments}
        VITE_PAYPAL_CLIENT_ID: ${VITE_PAYPAL_CLIENT_ID}
        VITE_LKR_TO_USD_RATE: ${VITE_LKR_TO_USD_RATE:-0.0033}
    container_name: smartdoc-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - smartdoc-net
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointment-service
      - payment-service
      - telemedicine-service
      - ai-service
      - notification-service

  # ── Auth Service (Port 3001) ───────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: smartdoc-auth
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - smartdoc-net
    environment:
      PORT: 3001
      SERVICE_NAME: Auth Service
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URI: ${MONGODB_URI_AUTH}
      MONGODB_DB_NAME: smartdoc_auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-SmartDoc Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_PHONE: ${ADMIN_PHONE:-+94770000000}

  # ── Patient Service (Port 3002) ────────────────────────────────────────────
  patient-service:
    build:
      context: ./services/patient-service
      dockerfile: Dockerfile
    container_name: smartdoc-patient
    restart: unless-stopped
    ports:
      - "3002:3002"
    networks:
      - smartdoc-net
    volumes:
      - patient-uploads:/app/uploads
    environment:
      PORT: 3002
      SERVICE_NAME: Patient Service
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URI: ${MONGODB_URI_PATIENT}
      MONGODB_DB_NAME: smartdoc_patient
      JWT_SECRET: ${JWT_SECRET}

  # ── Doctor Service (Port 3003) ─────────────────────────────────────────────
  doctor-service:
    build:
      context: ./services/doctor-service
      dockerfile: Dockerfile
    container_name: smartdoc-doctor
    restart: unless-stopped
    ports:
      - "3003:3003"
    networks:
      - smartdoc-net
    environment:
      PORT: 3003
      SERVICE_NAME: Doctor Service
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URI: ${MONGODB_URI_DOCTOR}
      MONGODB_DB_NAME: smartdoc_doctor
      JWT_SECRET: ${JWT_SECRET}
      PATIENT_SERVICE_URL: http://patient-service:3002/api/patients
    depends_on:
      - patient-service

  # ── Appointment Service (Port 3004) ───────────────────────────────────────
  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
    container_name: smartdoc-appointment
    restart: unless-stopped
    ports:
      - "3004:3004"
    networks:
      - smartdoc-net
    environment:
      PORT: 3004
      SERVICE_NAME: Appointment Service
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URI: ${MONGODB_URI_APPOINTMENT}
      MONGODB_DB_NAME: smartdoc_appointment
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NOTIFICATION_SERVICE_URL: http://notification-service:3006/api/notifications
      TELEMEDICINE_SERVICE_URL: http://telemedicine-service:3007/api/telemedicine
    depends_on:
      - notification-service

  # ── Payment Service (Port 3005) ────────────────────────────────────────────
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: smartdoc-payment
    restart: unless-stopped
    ports:
      - "3005:3005"
    networks:
      - smartdoc-net
    environment:
      PORT: 3005
      SERVICE_NAME: Payment Service
      NODE_ENV: ${NODE_ENV:-production}
      PAYPAL_BASE_URL: ${PAYPAL_BASE_URL:-https://api-m.sandbox.paypal.com}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_SECRET: ${PAYPAL_SECRET}
      LKR_TO_USD_RATE: ${LKR_TO_USD_RATE:-0.0033}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}

  # ── Notification Service (Port 3006) ──────────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: smartdoc-notification
    restart: unless-stopped
    ports:
      - "3006:3006"
    networks:
      - smartdoc-net
    environment:
      PORT: 3006
      SERVICE_NAME: Notification Service
      NODE_ENV: ${NODE_ENV:-production}
      SMTP_SERVICE: ${SMTP_SERVICE:-gmail}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      NOTIFICATION_FROM_EMAIL: ${NOTIFICATION_FROM_EMAIL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}

  # ── Telemedicine Service (Port 3007) ──────────────────────────────────────
  telemedicine-service:
    build:
      context: ./services/telemedicine-service
      dockerfile: Dockerfile
    container_name: smartdoc-telemedicine
    restart: unless-stopped
    ports:
      - "3007:3007"
    networks:
      - smartdoc-net
    environment:
      PORT: 3007
      SERVICE_NAME: Telemedicine Service
      NODE_ENV: ${NODE_ENV:-production}
      JITSI_BASE_URL: ${JITSI_BASE_URL:-https://meet.jit.si}
      TELEMEDICINE_ROOM_SECRET: ${TELEMEDICINE_ROOM_SECRET}

  # ── AI Service (Port 3008) ─────────────────────────────────────────────────
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: smartdoc-ai
    restart: unless-stopped
    ports:
      - "3008:3008"
    networks:
      - smartdoc-net
    volumes:
      - ai-uploads:/app/uploads
    environment:
      PORT: 3008
      SERVICE_NAME: AI Service
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URI: ${MONGODB_URI_AI}
      MONGODB_DB_NAME: smartdoc_ai
      JWT_SECRET: ${JWT_SECRET}
      HF_ACCESS_TOKEN: ${HF_ACCESS_TOKEN}
      ATLAS_VECTOR_INDEX: ${ATLAS_VECTOR_INDEX:-vector_index}
